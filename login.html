<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Netflix - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Netflix+Sans&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('https://assets.nflxext.com/ffe/siteui/vlv3/fc2bde19-3e5b-430a-9b62-4a18bfa40a3a/710d1d57-07d8-4cf4-93d8-f71b1cdcd713/IN-en-20240205-popsignuptwoweeks-perspective_alpha_website_large.jpg');
      background-size: cover; background-position: center;
    }
    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: rgba(0,0,0,0.6);
    }
    nav {
      position: relative; z-index: 10;
      padding: 1.5rem 3rem;
    }
    .logo {
      color: #e50914;
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: -1px;
      text-decoration: none;
    }
    .login-container {
      position: relative; z-index: 10;
      display: flex; justify-content: center; align-items: center;
      flex: 1; padding: 2rem;
    }
    .login-box {
      background: rgba(0,0,0,0.85);
      border-radius: 6px;
      padding: 3rem;
      width: 100%; max-width: 450px;
    }
    .login-box h1 {
      color: #fff;
      font-size: 2rem; font-weight: 700;
      margin-bottom: 1.8rem;
    }
    .form-group { margin-bottom: 1.2rem; position: relative; }
    .form-group input {
      width: 100%;
      padding: 1.1rem 1rem 0.4rem;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: #aaa; }
    .form-group label {
      position: absolute; top: 50%; left: 1rem;
      transform: translateY(-50%);
      color: #aaa; font-size: 1rem;
      pointer-events: none;
      transition: all 0.2s;
    }
    .form-group input:focus ~ label,
    .form-group input:not(:placeholder-shown) ~ label {
      top: 0.5rem; font-size: 0.7rem; color: #aaa;
    }
    .form-group input::placeholder { color: transparent; }
    .btn-signin {
      width: 100%;
      padding: 1rem;
      background: #e50914;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.3s;
    }
    .btn-signin:hover { background: #f40612; }
    .or-divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.2rem 0; color: #737373;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: #444;
    }
    .btn-code {
      width: 100%; padding: 0.9rem;
      background: transparent; color: #fff;
      border: 1px solid #737373; border-radius: 4px;
      font-size: 1rem; cursor: pointer; transition: border-color 0.3s;
    }
    .btn-code:hover { border-color: #fff; }
    .remember-forgot {
      display: flex; justify-content: space-between;
      margin-top: 1rem; font-size: 0.85rem; color: #aaa;
    }
    .remember-forgot label { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    .remember-forgot a { color: #aaa; text-decoration: none; }
    .remember-forgot a:hover { text-decoration: underline; }
    .signup-text {
      color: #737373; margin-top: 2rem; font-size: 0.95rem;
    }
    .signup-text a { color: #fff; text-decoration: none; }
    .signup-text a:hover { text-decoration: underline; }
    .captcha-text {
      color: #8c8c8c; font-size: 0.78rem; margin-top: 1rem; line-height: 1.6;
    }
    .captcha-text a { color: #0071eb; text-decoration: none; }
    footer {
      position: relative; z-index: 10;
      background: rgba(0,0,0,0.75);
      padding: 2rem 3rem; color: #737373; font-size: 0.85rem;
    }
    footer a { color: #737373; text-decoration: none; margin-right: 1.5rem; }
    footer a:hover { text-decoration: underline; }
    .footer-links { display: flex; flex-wrap: wrap; gap: 0.5rem 0; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <nav>
    <a href="index.html" class="logo">NETFLIX</a>
  </nav>

  <div class="login-container">
    <div class="login-box">
      <h1>Sign In</h1>
      <div class="form-group">
        <input type="email" id="email" placeholder="Email or phone number" />
        <label for="email">Email or phone number</label>
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="Password" />
        <label for="password">Password</label>
      </div>
      <button class="btn-signin" onclick="window.location.href='index.html'">Sign In</button>
      <div class="or-divider">OR</div>
      <button class="btn-code">Use a sign-in code</button>
      <div class="remember-forgot">
        <label><input type="checkbox"/> Remember me</label>
        <a href="#">Need help?</a>
      </div>
      <p class="signup-text">New to Netflix? <a href="#">Sign up now</a></p>
      <p class="captcha-text">
        This page is protected by Google reCAPTCHA to ensure you're not a bot.
        <a href="#">Learn more.</a>
      </p>
    </div>
  </div>

  <footer>
    <p>Questions? Call 000-800-919-1743</p>
    <div class="footer-links">
      <a href="#">FAQ</a>
      <a href="#">Help Centre</a>
      <a href="#">Terms of Use</a>
      <a href="#">Privacy</a>
      <a href="#">Cookie Preferences</a>
      <a href="#">Corporate Information</a>
    </div>
    <p style="margin-top:1rem">Netflix India</p>
  </footer>
</body>
</html>
